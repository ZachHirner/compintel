name: Competitive Intelligence Scrape

on:
  schedule:
    # Every Monday at 7am UTC (start of the work week)
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      competitor:
        description: "Run a specific competitor only (leave blank to run all)"
        required: false
        default: ""
      scrape_only:
        description: "Scrape only, skip analysis (no API key needed)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      analyze_only:
        description: "Skip scraping, re-analyze cached data only"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

jobs:
  scrape-and-analyze:
    strategy:
      matrix:
        competitor: [opentext, playwright, uipath, accelq, keysight]
      fail-fast: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run CI pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          COMPETITOR="${{ matrix.competitor }}"
          REQUESTED="${{ github.event.inputs.competitor }}"
          SCRAPE_ONLY="${{ github.event.inputs.scrape_only || 'false' }}"
          ANALYZE_ONLY="${{ github.event.inputs.analyze_only || 'false' }}"

          # If a specific competitor was requested, skip all others
          if [ -n "$REQUESTED" ] && [ "$REQUESTED" != "$COMPETITOR" ]; then
            echo "Skipping $COMPETITOR (only running $REQUESTED)"
            exit 0
          fi

          ARGS="--competitor $COMPETITOR"
          [ "$SCRAPE_ONLY" = "true" ]  && ARGS="$ARGS --scrape-only"
          [ "$ANALYZE_ONLY" = "true" ] && ARGS="$ARGS --analyze-only"

          python main.py $ARGS

      - name: Upload raw scrape data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-raw-data-${{ matrix.competitor }}-${{ github.run_id }}
          path: data/
          retention-days: 30

      - name: Commit raw data and CI report to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          COMPETITOR="${{ matrix.competitor }}"
          RUN_DATE="$(date -u +%Y-%m-%d)"
          RAW_DIR="data/$COMPETITOR/$RUN_DATE"
          REPORT_PATH="data/$COMPETITOR/ci_report.json"

          # Stage datestamped raw files (tracked via .gitignore negation rule)
          if [ -d "$RAW_DIR" ]; then
            git add "$RAW_DIR/"
          fi

          # Stage CI report if present (scrape-only runs won't have one)
          if [ -f "$REPORT_PATH" ]; then
            git add "$REPORT_PATH"
          fi

          git diff --staged --quiet && exit 0

          git commit -m "chore: $COMPETITOR CI run $RUN_DATE"

          # Retry push with pull-rebase to handle parallel matrix job conflicts
          for i in 1 2 3 4 5; do
            git push && break
            echo "Push attempt $i failed, pulling and retrying..."
            git pull --rebase origin HEAD
            sleep $((i * 2))
          done
