name: Competitive Intelligence Scrape

on:
  schedule:
    # Every Monday at 7am UTC (start of the work week)
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      competitor:
        description: "Competitor slug to scrape"
        required: false
        default: "opentext"
      scrape_only:
        description: "Scrape only, skip analysis (no API key needed)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      analyze_only:
        description: "Skip scraping, re-analyze cached data only"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run CI pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          COMPETITOR="${{ github.event.inputs.competitor || 'opentext' }}"
          SCRAPE_ONLY="${{ github.event.inputs.scrape_only || 'false' }}"
          ANALYZE_ONLY="${{ github.event.inputs.analyze_only || 'false' }}"

          ARGS="--competitor $COMPETITOR"
          [ "$SCRAPE_ONLY" = "true" ]  && ARGS="$ARGS --scrape-only"
          [ "$ANALYZE_ONLY" = "true" ] && ARGS="$ARGS --analyze-only"

          python main.py $ARGS

      - name: Upload raw scrape data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-raw-data-${{ github.event.inputs.competitor || 'opentext' }}-${{ github.run_id }}
          path: data/
          retention-days: 30

      - name: Commit raw data and CI report to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          COMPETITOR="${{ github.event.inputs.competitor || 'opentext' }}"
          RUN_DATE="$(date -u +%Y-%m-%d)"
          RAW_DIR="data/$COMPETITOR/$RUN_DATE"
          REPORT_PATH="data/$COMPETITOR/ci_report.json"

          # Stage datestamped raw files (tracked via .gitignore negation rule)
          if [ -d "$RAW_DIR" ]; then
            git add "$RAW_DIR/"
          fi

          # Stage CI report if present (scrape-only runs won't have one)
          if [ -f "$REPORT_PATH" ]; then
            git add "$REPORT_PATH"
          fi

          git diff --staged --quiet || git commit -m "chore: $COMPETITOR CI run $RUN_DATE"
          git push
